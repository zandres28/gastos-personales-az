<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gastos Personales AZ</title>
<meta name="description" content="Registro simple de gastos personales">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C8613C">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAF6F0;
  --card: #FFFFFF;
  --primary: #C8613C;
  --primary-dark: #AD4D2C;
  --primary-light: #F0DED6;
  --primary-glow: rgba(200, 97, 60, 0.15);
  --text: #1F1B16;
  --text-secondary: #7A7168;
  --text-tertiary: #A69B90;
  --border: #EBE3DA;
  --border-light: #F2ECE4;
  --success: #4A7C59;
  --danger: #C84C4C;
  --shadow-sm: 0 1px 3px rgba(31,27,22,0.06);
  --shadow-md: 0 4px 12px rgba(31,27,22,0.08);
  --shadow-lg: 0 8px 30px rgba(31,27,22,0.1);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --font-body: 'DM Sans', sans-serif;
  --font-display: 'Playfair Display', serif;
  --casa: #C8613C;
  --casa-bg: #FDF0EA;
  --empresa: #2B6B8A;
  --empresa-bg: #EBF2F6;
  --personal: #8B6C9E;
  --personal-bg: #F4EEF7;
}
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
#app {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* Header */
header { text-align: center; margin-bottom: 24px; }
header h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 2rem;
  color: var(--text);
  letter-spacing: -0.02em;
}
header h1 span { color: var(--primary); }
#date-display {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-top: 2px;
  text-transform: capitalize;
}

/* Card */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  padding: 20px;
  margin-bottom: 16px;
  transition: box-shadow 0.2s;
}

/* Form */
#form-card { padding-bottom: 16px; }
.amount-row {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  padding: 4px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 14px;
}
.amount-row:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.currency-symbol {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-secondary);
  font-family: var(--font-body);
}
#amount {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 1.75rem;
  font-weight: 700;
  font-family: var(--font-body);
  color: var(--text);
  outline: none;
  padding: 12px 0;
  min-width: 0;
  -moz-appearance: textfield;
}
#amount::-webkit-outer-spin-button,
#amount::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
#amount::placeholder { color: var(--text-tertiary); font-weight: 400; }

.form-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.cat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.cat-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 8px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-family: var(--font-body);
  font-size: 0.8125rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.cat-btn:hover { border-color: var(--text-tertiary); }
.cat-btn .cat-icon { font-size: 1rem; }
.cat-btn.active-casa { border-color: var(--casa); background: var(--casa-bg); color: var(--casa); }
.cat-btn.active-empresa { border-color: var(--empresa); background: var(--empresa-bg); color: var(--empresa); }
.cat-btn.active-personal { border-color: var(--personal); background: var(--personal-bg); color: var(--personal); }

.pay-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.pay-btn {
  padding: 6px 12px;
  border: 2px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  white-space: nowrap;
}
.pay-btn:hover { border-color: var(--text-tertiary); }
.pay-btn.active {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

#note {
  width: 100%;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-family: var(--font-body);
  font-size: 0.875rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 14px;
}
#note:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
#note::placeholder { color: var(--text-tertiary); }

#submit-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--primary);
  color: #fff;
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
#submit-btn:hover { background: var(--primary-dark); }
#submit-btn:active { transform: scale(0.98); }
#submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Loading */
.loading-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-tertiary);
}
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Summary */
.summary-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.summary-header h2 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.125rem;
}
#total-display {
  font-family: var(--font-display);
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--primary);
}
.summary-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
}
.summary-row + .summary-row { border-top: 1px solid var(--border-light); }
.summary-label {
  font-size: 0.8125rem;
  font-weight: 600;
  color: var(--text-secondary);
  min-width: 110px;
  white-space: nowrap;
}
.summary-amount {
  font-size: 0.875rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  min-width: 70px;
  text-align: right;
}
.summary-bar-track {
  flex: 1;
  height: 6px;
  background: var(--border-light);
  border-radius: 3px;
  overflow: hidden;
}
.summary-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* Entries */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.section-header h2 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.125rem;
}
.entry-count {
  font-size: 0.8125rem;
  color: var(--text-tertiary);
  font-weight: 500;
}

.entry {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
  margin-bottom: 8px;
  background: var(--card);
  transition: all 0.25s;
  animation: slideIn 0.3s ease;
  cursor: pointer;
}
.entry:hover {
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.entry.removing {
  opacity: 0;
  transform: translateX(20px);
}
.entry-top {
  display: flex;
  align-items: center;
  gap: 10px;
}
.entry-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}
.entry-time {
  font-size: 0.75rem;
  color: var(--text-tertiary);
  font-weight: 500;
  flex-shrink: 0;
}
.entry-amount {
  margin-left: auto;
  font-size: 1rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.entry-delete {
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 0.75rem;
  padding: 4px 6px;
  border-radius: 4px;
  opacity: 0;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.entry:hover .entry-delete,
.entry:focus-within .entry-delete { opacity: 1; }
.entry-delete:hover { color: var(--danger); background: rgba(200,76,76,0.1); }
.entry-bottom {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.entry-note {
  font-size: 0.8125rem;
  color: var(--text-secondary);
  padding-left: 4px;
}
.entry-pay {
  font-size: 0.6875rem;
  font-weight: 600;
  color: var(--text-tertiary);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border-light);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-tertiary);
}
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }
.empty-state p { font-size: 0.9375rem; }

/* Toggle history */
#toggle-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 12px;
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  font-family: var(--font-body);
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
  -webkit-tap-highlight-color: transparent;
}
#toggle-btn:hover { border-color: var(--text-tertiary); color: var(--text); }

/* Responsive */
@media (max-width: 400px) {
  #app { padding: 16px 12px 32px; }
  .cat-btn { font-size: 0.75rem; padding: 8px 4px; }
  .cat-btn .cat-icon { font-size: 0.875rem; }
  #amount { font-size: 1.5rem; }
  .pay-btn { padding: 5px 10px; font-size: 0.6875rem; }
}

/* Edit Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(31,27,22,0.4);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s, visibility 0.25s;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
}
.modal-overlay.open {
  opacity: 1;
  visibility: visible;
}
.modal-sheet {
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 20px;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.modal-overlay.open .modal-sheet {
  transform: translateY(0);
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}
.modal-header h3 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.125rem;
}
.modal-close {
  background: var(--bg);
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  font-size: 1rem;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.modal-close:hover { background: var(--border); }
.modal-amount-row {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  padding: 4px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 14px;
}
.modal-amount-row:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.modal-amount-row .currency-symbol {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-secondary);
}
#edit-amount {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 1.75rem;
  font-weight: 700;
  font-family: var(--font-body);
  color: var(--text);
  outline: none;
  padding: 12px 0;
  min-width: 0;
  -moz-appearance: textfield;
}
#edit-amount::-webkit-outer-spin-button,
#edit-amount::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}
.modal-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.9375rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.modal-btn:active { transform: scale(0.98); }
.modal-btn-cancel {
  background: var(--bg);
  color: var(--text-secondary);
  border: 2px solid var(--border);
}
.modal-btn-cancel:hover { border-color: var(--text-tertiary); }
.modal-btn-save {
  background: var(--primary);
  color: #fff;
}
.modal-btn-save:hover { background: var(--primary-dark); }
.modal-btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.875rem;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span>Gastos</span> Personales AZ</h1>
    <p id="date-display"></p>
  </header>

  <div class="card" id="form-card">
    <form id="form" autocomplete="off">
      <div class="amount-row">
        <span class="currency-symbol">$</span>
        <input type="number" id="amount" step="0.01" min="0" placeholder="0.00" inputmode="decimal" required>
      </div>
      <p class="form-label">Categoría</p>
      <div class="cat-row">
        <button type="button" class="cat-btn" data-cat="casa"><span class="cat-icon">🏠</span> Casa</button>
        <button type="button" class="cat-btn" data-cat="empresa"><span class="cat-icon">💼</span> Empresa</button>
        <button type="button" class="cat-btn" data-cat="personal"><span class="cat-icon">👤</span> Personal</button>
      </div>
      <p class="form-label">Medio de pago</p>
      <div class="pay-row">
        <button type="button" class="pay-btn" data-pay="Efectivo">💵 Efectivo</button>
        <button type="button" class="pay-btn" data-pay="Nequi">💜 Nequi</button>
        <button type="button" class="pay-btn" data-pay="TC Rappi">🔴 TC Rappi</button>
        <button type="button" class="pay-btn" data-pay="TC NU">⚫ TC NU</button>
        <button type="button" class="pay-btn" data-pay="TC BBA">🟡 TC BBA</button>
      </div>
      <input type="text" id="note" placeholder="Nota opcional (ej. Supermercado, transporte...)" maxlength="100">
      <button type="submit" id="submit-btn" disabled>✚ Agregar Gasto</button>
    </form>
  </div>

  <div class="card" id="summary-card">
    <div class="summary-header">
      <h2>Resumen</h2>
      <span id="total-display">$0.00</span>
    </div>
    <div id="summary-rows"></div>
  </div>

  <section id="entries-section">
    <div class="section-header">
      <h2 id="entries-title">Gastos de Hoy</h2>
      <span class="entry-count" id="entry-count"></span>
    </div>
    <div id="entries-list">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Cargando gastos...</p>
      </div>
    </div>
    <button id="toggle-btn">📅 Ver historial completo</button>
  </section>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3>Editar Gasto</h3>
      <button class="modal-close" id="edit-cancel-btn">✕</button>
    </div>
    <div class="modal-amount-row">
      <span class="currency-symbol">$</span>
      <input type="number" id="edit-amount" step="0.01" min="0" placeholder="0.00" inputmode="decimal">
    </div>
    <p class="form-label">Categoría</p>
    <div class="cat-row" id="edit-cat-row">
      <button type="button" class="cat-btn" data-cat="casa"><span class="cat-icon">🏠</span> Casa</button>
      <button type="button" class="cat-btn" data-cat="empresa"><span class="cat-icon">💼</span> Empresa</button>
      <button type="button" class="cat-btn" data-cat="personal"><span class="cat-icon">👤</span> Personal</button>
    </div>
    <p class="form-label">Medio de pago</p>
    <div class="pay-row" id="edit-pay-row">
      <button type="button" class="pay-btn" data-pay="Efectivo">💵 Efectivo</button>
      <button type="button" class="pay-btn" data-pay="Nequi">💜 Nequi</button>
      <button type="button" class="pay-btn" data-pay="TC Rappi">🔴 TC Rappi</button>
      <button type="button" class="pay-btn" data-pay="TC NU">⚫ TC NU</button>
      <button type="button" class="pay-btn" data-pay="TC BBA">🟡 TC BBA</button>
    </div>
    <input type="text" id="edit-note" placeholder="Nota opcional" maxlength="100">
    <div class="modal-actions">
      <button type="button" class="modal-btn modal-btn-cancel" id="edit-cancel-btn-2">Cancelar</button>
      <button type="button" class="modal-btn modal-btn-save" id="edit-save-btn">Guardar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://uropsimoqicadhfwtqfu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_z6L9E8q6nUPNzzaRzFxT3A_3LgcdlwX';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CATEGORIES = {
  casa: { label: 'Casa', icon: '🏠', color: 'var(--casa)' },
  empresa: { label: 'Empresa', icon: '💼', color: 'var(--empresa)' },
  personal: { label: 'Personal', icon: '👤', color: 'var(--personal)' }
};

const COLORS = {
  casa: getComputedStyle(document.documentElement).getPropertyValue('--casa').trim(),
  empresa: getComputedStyle(document.documentElement).getPropertyValue('--empresa').trim(),
  personal: getComputedStyle(document.documentElement).getPropertyValue('--personal').trim()
};

// State
let entries = [];
let selectedCategory = null;
let selectedPay = null;
let viewingHistory = false;
let editingId = null;
let editCat = null;
let editPay = null;

// DOM refs
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const form = $('#form');
const amountInput = $('#amount');
const catBtns = $$('.cat-btn');
const payBtns = $$('.pay-btn');
const noteInput = $('#note');
const submitBtn = $('#submit-btn');
const entriesList = $('#entries-list');
const totalDisplay = $('#total-display');
const summaryRows = $('#summary-rows');
const dateDisplay = $('#date-display');
const entryCount = $('#entry-count');
const entriesTitle = $('#entries-title');
const toggleBtn = $('#toggle-btn');
const toast = $('#toast');
const editModal = $('#edit-modal');
const editAmount = $('#edit-amount');
const editCatRow = $('#edit-cat-row');
const editPayRow = $('#edit-pay-row');
const editNote = $('#edit-note');
const editSaveBtn = $('#edit-save-btn');
const editCancelBtn = $('#edit-cancel-btn');
const editCancelBtn2 = $('#edit-cancel-btn-2');

// Init
async function init() {
  updateDateDisplay();
  await loadEntries();
  render();
  setupForm();
  setupEditModal();
  setupToggle();
  registerSW();
}

function updateDateDisplay() {
  const now = new Date();
  const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
  dateDisplay.textContent = now.toLocaleDateString('es-MX', opts);
}

// Supabase CRUD
async function loadEntries() {
  const { data, error } = await db
    .from('gastos')
    .select('*')
    .order('timestamp', { ascending: false });
  entries = data || [];
}

async function saveEntry(entry) {
  const { data, error } = await db
    .from('gastos')
    .insert([entry])
    .select();
  if (!error && data) entries.unshift(data[0]);
  return !error;
}

async function deleteEntryFromDB(id) {
  const { error } = await db
    .from('gastos')
    .delete()
    .eq('id', id);
  if (!error) entries = entries.filter(e => e.id !== id);
  return !error;
}

async function updateEntryInDB(id, updates) {
  const { data, error } = await db
    .from('gastos')
    .update(updates)
    .eq('id', id)
    .select();
  if (!error && data) {
    const idx = entries.findIndex(e => e.id === id);
    if (idx !== -1) entries[idx] = data[0];
  }
  return !error;
}

function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}

function getTodayEntries() {
  const today = getTodayStr();
  return entries.filter(e => e.date === today);
}

function getDisplayEntries() {
  return viewingHistory ? entries : getTodayEntries();
}

function getCategoryTotals(list) {
  const t = { casa: 0, empresa: 0, personal: 0 };
  list.forEach(e => { t[e.category] += Number(e.amount); });
  return t;
}

// Render
function render() {
  const display = getDisplayEntries();
  renderSummary(display);
  renderEntries(display);
  updateToggleLabel();
}

function renderSummary(list) {
  const totals = getCategoryTotals(list);
  const total = totals.casa + totals.empresa + totals.personal;
  totalDisplay.textContent = formatCurrency(total);

  const maxVal = Math.max(totals.casa, totals.empresa, totals.personal, 1);
  let html = '';
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const pct = (totals[key] / maxVal) * 100;
    const color = COLORS[key];
    html += `
      <div class="summary-row">
        <span class="summary-label">${cat.icon} ${cat.label}</span>
        <span class="summary-amount" style="color:${color}">${formatCurrency(totals[key])}</span>
        <div class="summary-bar-track">
          <div class="summary-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>
    `;
  });
  summaryRows.innerHTML = html;
}

function renderEntries(list) {
  if (list.length === 0) {
    entriesList.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>${viewingHistory ? 'No hay gastos registrados' : 'No hay gastos registrados hoy'}</p>
      </div>`;
    entryCount.textContent = '';
    return;
  }

  const sorted = [...list].sort((a, b) => b.timestamp - a.timestamp);
  let html = '';
  sorted.forEach(entry => {
    const cat = CATEGORIES[entry.category];
    const color = COLORS[entry.category];
    const pay = entry.payment_method || 'Efectivo';
    const bottomParts = [];
    if (entry.note) bottomParts.push(`<span class="entry-note">${esc(entry.note)}</span>`);
    bottomParts.push(`<span class="entry-pay">${esc(pay)}</span>`);
    const bottom = bottomParts.length ? `<div class="entry-bottom">${bottomParts.join('')}</div>` : '';
    html += `
      <div class="entry" data-id="${entry.id}">
        <div class="entry-top">
          <span class="entry-badge" style="background:${color}18;color:${color}">${cat.icon} ${cat.label}</span>
          <span class="entry-time">${formatTime(entry.timestamp)}</span>
          <span class="entry-amount" style="color:${color}">${formatCurrency(entry.amount)}</span>
          <button class="entry-delete" data-id="${entry.id}" aria-label="Eliminar">✕</button>
        </div>
        ${bottom}
      </div>`;
  });
  entriesList.innerHTML = html;

  entryCount.textContent = list.length === 1 ? '1 gasto' : `${list.length} gastos`;

  entriesList.querySelectorAll('.entry').forEach(el => {
    el.addEventListener('click', () => openEditModal(el.dataset.id));
  });

  entriesList.querySelectorAll('.entry-delete').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const el = entriesList.querySelector(`.entry[data-id="${btn.dataset.id}"]`);
      if (el) el.classList.add('removing');
      const ok = await deleteEntryFromDB(btn.dataset.id);
      if (ok) { render(); showToast('Gasto eliminado'); }
    });
  });
}

// Formatting
function formatCurrency(amount) {
  return '$' + Number(amount).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Add entry
async function addEntry(amount, category, note, paymentMethod) {
  const entry = {
    amount: Math.round(amount * 100) / 100,
    category,
    note: note.trim(),
    payment_method: paymentMethod,
    date: getTodayStr(),
    timestamp: Date.now()
  };
  const ok = await saveEntry(entry);
  if (ok) { render(); showToast('Gasto registrado ✨'); }
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// Edit Modal
function openEditModal(id) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  editingId = id;
  editAmount.value = entry.amount;
  editNote.value = entry.note || '';
  editCat = entry.category;
  editPay = entry.payment_method || 'Efectivo';
  renderEditCatButtons();
  renderEditPayButtons();
  editSaveBtn.disabled = false;
  editModal.classList.add('open');
  document.body.style.overflow = 'hidden';
  editAmount.focus();
  editAmount.select();
}

function closeEditModal() {
  editModal.classList.remove('open');
  document.body.style.overflow = '';
  editingId = null;
  editCat = null;
  editPay = null;
}

function renderEditCatButtons() {
  editCatRow.querySelectorAll('.cat-btn').forEach(btn => {
    btn.className = 'cat-btn';
    if (btn.dataset.cat === editCat) btn.classList.add('active-' + editCat);
  });
}

function renderEditPayButtons() {
  editPayRow.querySelectorAll('.pay-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.pay === editPay) btn.classList.add('active');
  });
}

async function saveEdit() {
  const amount = parseFloat(editAmount.value);
  if (!amount || amount <= 0 || !editCat || !editPay) return;
  editSaveBtn.disabled = true;
  const ok = await updateEntryInDB(editingId, {
    amount: Math.round(amount * 100) / 100,
    category: editCat,
    payment_method: editPay,
    note: editNote.value.trim()
  });
  closeEditModal();
  render();
  if (ok) showToast('Gasto actualizado ✨');
}

function setupEditModal() {
  editCatRow.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      editCatRow.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn');
      btn.classList.add('active-' + btn.dataset.cat);
      editCat = btn.dataset.cat;
    });
  });

  editPayRow.querySelectorAll('.pay-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      editPayRow.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      editPay = btn.dataset.pay;
    });
  });

  editSaveBtn.addEventListener('click', saveEdit);
  editCancelBtn.addEventListener('click', closeEditModal);
  editCancelBtn2.addEventListener('click', closeEditModal);

  editModal.addEventListener('click', e => {
    if (e.target === editModal) closeEditModal();
  });
}

// Form
function setupForm() {
  catBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      catBtns.forEach(b => b.className = 'cat-btn');
      btn.classList.add('active-' + btn.dataset.cat);
      selectedCategory = btn.dataset.cat;
      validateForm();
    });
  });

  payBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      payBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPay = btn.dataset.pay;
      validateForm();
    });
  });

  amountInput.addEventListener('input', validateForm);
  noteInput.addEventListener('input', validateForm);

  form.addEventListener('submit', async e => {
    e.preventDefault();
    if (submitBtn.disabled) return;
    const amount = parseFloat(amountInput.value);
    submitBtn.disabled = true;
    await addEntry(amount, selectedCategory, noteInput.value, selectedPay);
    form.reset();
    catBtns.forEach(b => b.className = 'cat-btn');
    payBtns.forEach(b => b.classList.remove('active'));
    selectedCategory = null;
    selectedPay = null;
    submitBtn.disabled = true;
    amountInput.focus();
  });
}

function validateForm() {
  const amount = parseFloat(amountInput.value);
  const valid = amount > 0 && selectedCategory !== null && selectedPay !== null;
  submitBtn.disabled = !valid;
}

// Toggle history
function setupToggle() {
  toggleBtn.addEventListener('click', () => {
    viewingHistory = !viewingHistory;
    render();
    toggleBtn.textContent = viewingHistory ? '📅 Ver solo hoy' : '📅 Ver historial completo';
  });
}

function updateToggleLabel() {
  entriesTitle.textContent = viewingHistory ? 'Todos los Gastos' : 'Gastos de Hoy';
}

// PWA
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

// Boot
init();
</script>
</body>
</html>
